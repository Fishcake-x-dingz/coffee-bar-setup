<!DOCTYPE html>
<html>
<head>
  <title>DoseClose</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin: 0; padding: 0; }
    .fade-in { animation: fadeIn 0.3s ease-in; }

    .skeleton {

    }
    @keyframes skeleton-loading {
      0% { background-color: #e0e0e0; }
      100% { background-color: #f0f0f0; }
    }

    .heart-icon {
      cursor: pointer;

<body class="bg-[#eef1f3]">
<div id="root"></div>

<script src="data.js"></script>

<script>
const { useState, useEffect, useRef } = React;

/* =========================
   HELPERS
========================= */
const formatNumber = (num) => num ? num.toLocaleString("en-US") : "";
const parseNumber = (val) => Number(val.replace(/[^0-9]/g, "")) || 0;

// LOCAL STORAGE HELPERS
const getFavorites = () => {
  const stored = localStorage.getItem("dosclose_favorites");
  return stored ? JSON.parse(stored) : [];
};

const addFavorite = (item) => {
  const favorites = getFavorites();
  if (!favorites.find(f => f.name === item.name && f.type === item.type)) {
    favorites.push({ ...item, type: item.type });
    localStorage.setItem("dosclose_favorites", JSON.stringify(favorites));
  }
};

const removeFavorite = (name, type) => {
  const favorites = getFavorites().filter(f => !(f.name === name && f.type === type));
  localStorage.setItem("dosclose_favorites", JSON.stringify(favorites));
};

const isFavorite = (name, type) => {
  return getFavorites().some(f => f.name === name && f.type === type);
};

// SHARE FUNCTION
const generateShareLink = (machine, grinder, budget) => {
  const data = btoa(JSON.stringify({ machine: machine?.name, grinder: grinder?.name, budget }));
  return `${window.location.origin}${window.location.pathname}?shared=${data}`;
};

const generateQRCode = (text) => {
  return `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(text)}`;
};

/* =========================
   LOADING SKELETON
========================= */
function LoadingSkeleton() {
  return React.createElement("div", { className: "max-w-6xl mx-auto p-10" },
    React.createElement("div", { className: "skeleton h-12 w-32 mb-8 rounded-lg" }),
    React.createElement("div", { className: "grid grid-cols-1 md:grid-cols-3 gap-4" },
      React.createElement("div", { className: "skeleton h-40 rounded-lg" }),
      React.createElement("div", { className: "skeleton h-40 rounded-lg" }),
      React.createElement("div", { className: "skeleton h-40 rounded-lg" })
    )
  );
}

/* =========================
   ERROR FALLBACK
========================= */
function ErrorFallback({ message, onRetry }) {
  return React.createElement("div", { className: "max-w-2xl mx-auto p-10 text-center fade-in" },
    React.createElement("div", { className: "bg-red-50 border-2 border-red-200 rounded-2xl p-8" },
      React.createElement("p", { className: "text-4xl mb-4" }, "⚠️"),
      React.createElement("h2", { className: "text-2xl font-bold text-red-700 mb-2" }, "Oops! Something went wrong"),
      React.createElement("p", { className: "text-red-600 mb-6" }, message || "Failed to load products. Please try again."),
      React.createElement("button", {
        onClick: onRetry,
        className: "bg-red-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-red-700 transition"
      }, "🔄 Retry")
    )
  );
}

/* =========================
   PRODUCT DETAILS MODAL
========================= */
function ProductModal({ item, isMachine, onClose }) {
  if (!item) return null;

  return React.createElement("div", {
    className: "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 fade-in"
  },
    React.createElement("div", {
      className: "bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto"
    },
      // CLOSE BUTTON
      React.createElement("button", {
        onClick: onClose,
        className: "sticky top-4 right-4 float-right bg-gray-200 hover:bg-gray-300 rounded-full w-10 h-10 flex items-center justify-center z-10"
      }, "✕"),

      // IMAGE
      item.imageUrl && React.createElement("img", {
        src: item.imageUrl,
        alt: item.name,
        className: "w-full h-80 object-cover",
        onError: (e) => e.target.style.display = "none"
      }),

      // CONTENT
      React.createElement("div", { className: "p-8" },
        // HEADER
        React.createElement("div", { className: "mb-6" },
          React.createElement("h2", { className: "text-3xl font-bold text-gray-900 mb-2" }, item.name),
          React.createElement("p", { className: "text-lg text-gray-600" }, item.brand)
        ),

        // PRICE & RATING
        React.createElement("div", { className: "grid grid-cols-2 gap-4 mb-6" },
          React.createElement("div", { className: "p-4 bg-green-50 rounded-lg" },
            React.createElement("p", { className: "text-sm text-gray-600 mb-1" }, "Price"),
            React.createElement("p", { className: "text-2xl font-bold text-green-600" },
              `Rp ${formatNumber(item.price)}`
            )
          ),
          item.rating && React.createElement("div", { className: "p-4 bg-yellow-50 rounded-lg" },
            React.createElement("p", { className: "text-sm text-gray-600 mb-1" }, "Rating"),
            React.createElement("p", { className: "text-2xl font-bold text-yellow-600" },
              `⭐ ${item.rating}`
            ),
            React.createElement("p", { className: "text-xs text-gray-500" },
              `${item.reviewCount || 0} reviews`
            )
          )
        ),

        // SPECS
        React.createElement("div", { className: "mb-6" },
          React.createElement("h3", { className: "text-lg font-bold text-gray-900 mb-4" }, "Specifications"),
          React.createElement("div", { className: "grid grid-cols-2 gap-4" },
            React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Power"),
              React.createElement("p", { className: "font-semibold" }, `${formatNumber(item.power)} W`)
            ),
            React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Made In"),
              React.createElement("p", { className: "font-semibold" }, item.madeIn)
            ),

            isMachine && item.boilerType && React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Boiler Type"),
              React.createElement("p", { className: "font-semibold" }, item.boilerType)
            ),
            isMachine && item.waterCapacity && React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Water Capacity"),
              React.createElement("p", { className: "font-semibold" }, `${item.waterCapacity} L`)
            ),
            isMachine && item.steamPressure && React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Steam Pressure"),
              React.createElement("p", { className: "font-semibold" }, `${item.steamPressure} Bar`)
            ),
            isMachine && item.warranty && React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Warranty"),
              React.createElement("p", { className: "font-semibold" }, `${item.warranty} months`)
            ),

            !isMachine && item.burrrType && React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Burr Type"),
              React.createElement("p", { className: "font-semibold" }, item.burrrType)
            ),
            !isMachine && item.grindSettings && React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Grind Settings"),
              React.createElement("p", { className: "font-semibold" }, `${item.grindSettings} settings`)
            ),
            !isMachine && item.capacity && React.createElement("div", null,
              React.createElement("p", { className: "text-sm text-gray-500" }, "Hopper Capacity"),
              React.createElement("p", { className: "font-semibold" }, `${item.capacity}g`)
            )
          )
        ),

        item.features && React.createElement("div", { className: "mb-6" },
          React.createElement("h3", { className: "text-lg font-bold text-gray-900 mb-2" }, "Features"),
          React.createElement("p", { className: "text-gray-700" }, item.features)
        ),

        React.createElement("a", {
          href: `https://wa.me/6285282704370?text=Hi!, I'm interested in this ${isMachine ? 'coffee machine' : 'grinder'}:%0A${item.name} by ${item.brand}`,
          target: "_blank",
          className: "block w-full bg-green-500 text-white text-center py-3 rounded-lg font-semibold hover:bg-green-600 transition"
        }, "💬 Ask on WhatsApp")
      )
    )
  );
}

/* =========================
   HOMEPAGE
========================= */
function Home({ goToRecommend, goToCompare, goToBrowse, goToFavorites }) {
  return React.createElement("div", { className: "text-center fade-in" },

    // LOGO
    React.createElement("div", { className: "py-10" },
      React.createElement("img", {
        src: "logo.png",
        className: "mx-auto w-[90%] md:w-[420px]",
        style: { maxWidth: "90%", height: "auto" }
      })
    ),

    // COPY BOX
    React.createElement("div", {
      className: "bg-[#b8a999] rounded-3xl py-20 px-10 max-w-4xl mx-auto mb-10"
    },
      React.createElement("p", { className: "text-lg text-gray-900" },
        "Find your perfect coffee setup without confusion. Just input your budget and let us guide you."
      )
    ),

    // BUTTONS
    React.createElement("div", { className: "flex flex-col md:flex-row justify-center gap-6 pb-20 px-4" },

      React.createElement("button", {
        onClick: goToRecommend,
        className: "bg-black text-white px-8 py-4 rounded-2xl text-lg font-semibold hover:bg-gray-800 transition"
      }, "💡 Recommend Me!"),

      React.createElement("button", {
        onClick: goToCompare,
        className: "bg-black text-white px-8 py-4 rounded-2xl text-lg font-semibold hover:bg-gray-800 transition"
      }, "⚖️ Let's Compare!"),

      React.createElement("button", {
        onClick: goToBrowse,
        className: "bg-black text-white px-8 py-4 rounded-2xl text-lg font-semibold hover:bg-gray-800 transition"
      }, "🔍 Browse All"),

      React.createElement("button", {
        onClick: goToFavorites,
        className: "bg-red-600 text-white px-8 py-4 rounded-2xl text-lg font-semibold hover:bg-red-700 transition"
      }, "❤️ Favorites")
    )
  );
}

/* =========================
   FAVORITES PAGE
========================= */
function FavoritesPage() {
  const [favorites, setFavorites] = useState(getFavorites());
  const [modalItem, setModalItem] = useState(null);

  const removeFav = (name, type) => {
    removeFavorite(name, type);
    setFavorites(getFavorites());
  };

  return React.createElement("div", { className: "p-10 max-w-6xl mx-auto fade-in" },

    React.createElement("button", {
      onClick: () => location.reload(),
      className: "mb-6 underline text-gray-700 hover:text-black transition"
    }, "← Back"),

    React.createElement("h2", { className: "text-3xl font-bold mb-8 text-gray-900" }, 
      `❤️ Your Favorites (${favorites.length})`
    ),

    favorites.length === 0 ? React.createElement("div", { className: "text-center py-12 text-gray-500" },
      React.createElement("p", { className: "text-lg mb-4" }, "No favorites yet!"),
      React.createElement("p", { className: "text-sm" }, "Start adding items to your wishlist.")
    ) : React.createElement("div", { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" },
      favorites.map(item =>
        React.createElement("div", {
          key: `${item.name}-${item.type}`,
          className: "bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200 hover:shadow-xl transition fade-in cursor-pointer"
        },
          React.createElement("div", { onClick: () => setModalItem(item) },
            item.imageUrl && React.createElement("img", {
              src: item.imageUrl,
              alt: item.name,
              className: "w-full h-48 object-cover",
              onError: (e) => e.target.style.display = "none"
            }),

            React.createElement("div", { className: "p-4" },
              React.createElement("h3", { className: "font-bold text-lg text-gray-900 mb-1" }, item.name),
              React.createElement("p", { className: "text-gray-600 text-sm mb-2" }, item.brand),
              React.createElement("p", { className: "text-2xl font-bold text-green-600 mb-3" },
                `Rp ${formatNumber(item.price)}`
              ),
              React.createElement("p", { className: "text-xs text-gray-500 mb-3" },
                `${item.type === 'machine' ? '☕ Machine' : '⚙️ Grinder'}`
              )
            )
          ),

          React.createElement("button", {
            onClick: (e) => {
              e.stopPropagation();
              removeFav(item.name, item.type);
            },
            className: "w-full bg-red-100 text-red-600 py-2 hover:bg-red-200 transition font-semibold"
          }, "Remove from Favorites")
        )
      )
    ),

    modalItem && React.createElement(ProductModal, {
      item: modalItem,
      isMachine: modalItem.type === 'machine',
      onClose: () => setModalItem(null)
    })
  );
}

/* =========================
   RECOMMENDATION PAGE (FIXED)
========================= */
function RecommendationPage({ machines, grinders }) {

  const [budgetInput, setBudgetInput] = useState("");
  const [budget, setBudget] = useState(0);
  const [machinePct, setMachinePct] = useState(70);
  const [grinderPct, setGrinderPct] = useState(30);
  const [result, setResult] = useState(null);
  const [showShare, setShowShare] = useState(false);
  const [copySuccess, setCopySuccess] = useState(false);

  const handleBudgetChange = (val) => {
    const num = parseNumber(val);
    setBudget(num);
    setBudgetInput(val === "" ? "" : formatNumber(num));
  };

  const getBestItem = (items, maxBudget) => {
    return items
      .filter(i => i.price <= maxBudget)
      .sort((a, b) => b.price - a.price)[0] || null;
  };

  const getCheapest = (items) => {
    return [...items].sort((a, b) => a.price - b.price)[0];
  };

  const handleMachineSliderChange = (val) => {
    const newMachinePct = Number(val);
    setMachinePct(newMachinePct);
    setGrinderPct(100 - newMachinePct);
  };

  const handleGrinderSliderChange = (val) => {
    const newGrinderPct = Number(val);
    setGrinderPct(newGrinderPct);
    setMachinePct(100 - newGrinderPct);
  };

  const generate = () => {

    if (!budget) {
      alert("Please insert your budget");
      return;
    }

    let machine = null;
    let grinder = null;

    if (machinePct > 0) {
      const machineBudget = budget * (machinePct / 100);
      machine = getBestItem(machines, machineBudget);
    }

    if (grinderPct > 0) {
      const grinderBudget = budget * (grinderPct / 100);
      grinder = getBestItem(grinders, grinderBudget);
    }

    let message = "";
    let remaining = 0;

    let totalUsed =
      (machine?.price || 0) +
      (grinder?.price || 0);

    if ((machinePct > 0 && !machine) || (grinderPct > 0 && !grinder)) {

      let bestMachine = getBestItem(machines, budget);
      let bestGrinder = getBestItem(grinders, budget);

      if (!bestMachine) bestMachine = getCheapest(machines);
      if (!bestGrinder) bestGrinder = getCheapest(grinders);

      const minSetup = getCheapest(machines).price + getCheapest(grinders).price;

      if (budget < minSetup) {
        const diff = minSetup - budget;
        message = `Sorry, there's no suitable setup within the budget. Add Rp ${formatNumber(diff)} more to get started.`;
      }

      machine = machinePct > 0 ? bestMachine : null;
      grinder = grinderPct > 0 ? bestGrinder : null;

      totalUsed =
        (machine?.price || 0) +
        (grinder?.price || 0);
    }

    if (totalUsed <= budget) {
      remaining = budget - totalUsed;
    } else {
      const diff = totalUsed - budget;
      message = `Add Rp ${formatNumber(diff)} more to get this setup`;
    }

    setResult({ machine, grinder, message, remaining });
    setShowShare(false);
  };

  const copyShareLink = () => {
    const link = generateShareLink(result.machine, result.grinder, budget);
    navigator.clipboard.writeText(link);
    setCopySuccess(true);
    setTimeout(() => setCopySuccess(false), 2000);
  };

  return React.createElement("div", { className: "p-10 max-w-3xl mx-auto fade-in" },

    React.createElement("button", {
      onClick: () => location.reload(),
      className: "mb-6 underline text-gray-700 hover:text-black transition"
    }, "← Back"),

    React.createElement("h2", { className: "text-3xl font-bold mb-8 text-gray-900" }, "Get Recommended Setup"),

    // BUDGET INPUT
    React.createElement("div", { className: "mb-6" },
      React.createElement("label", { className: "text-sm font-semibold text-gray-700 mb-2 block" }, "Your Budget"),
      React.createElement("div", { className: "flex" },
        React.createElement("span", { className: "bg-[#b8a999] px-4 py-3 font-semibold" }, "Rp"),
        React.createElement("input", {
          type: "text",
          value: budgetInput,
          placeholder: "e.g., 5000000",
          onChange: (e) => handleBudgetChange(e.target.value),
          className: "w-full p-3 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-black"
        })
      ),
      React.createElement("p", { className: "text-xs text-gray-500 mt-1" }, "Only numbers allowed")
    ),

    // SLIDERS WITH BETTER UX
    React.createElement("div", { className: "mb-8 bg-gray-50 p-6 rounded-xl" },
      React.createElement("p", { className: "text-sm font-semibold text-gray-700 mb-6" }, 
        "Adjust budget allocation (total: 100%)"
      ),

      React.createElement("div", { className: "mb-6" },
        React.createElement("div", { className: "flex justify-between items-center mb-2" },
          React.createElement("label", { className: "text-sm font-semibold text-gray-700" }, "☕ Machine"),
          React.createElement("div", { className: "flex items-center gap-2" },
            React.createElement("span", { className: "bg-black text-white px-3 py-1 rounded-lg font-bold text-sm" },
              `${machinePct}%`
            ),
            machinePct === 0 && React.createElement("span", { className: "text-xs text-gray-500" }, "(optional)")
          )
        ),
        React.createElement("input", {
          type: "range",
          min: 0,
          max: 100,
          value: machinePct,
          onChange: (e) => handleMachineSliderChange(e.target.value),
          className: "w-full"
        })
      ),

      React.createElement("div", null,
        React.createElement("div", { className: "flex justify-between items-center mb-2" },
          React.createElement("label", { className: "text-sm font-semibold text-gray-700" }, "⚙️ Grinder"),
          React.createElement("div", { className: "flex items-center gap-2" },
            React.createElement("span", { className: "bg-black text-white px-3 py-1 rounded-lg font-bold text-sm" },
              `${grinderPct}%`
            ),
            grinderPct === 0 && React.createElement("span", { className: "text-xs text-gray-500" }, "(optional)")
          )
        ),
        React.createElement("input", {
          type: "range",
          min: 0,
          max: 100,
          value: grinderPct,
          onChange: (e) => handleGrinderSliderChange(e.target.value),
          className: "w-full"
        })
      )
    ),

    React.createElement("button", {
      onClick: generate,
      className: "bg-black text-white w-full py-4 rounded-xl font-bold text-lg mb-8 hover:bg-gray-800 transition"
    }, "Generate Recommendation"),

    // RESULT - STAYS VISIBLE WHEN SLIDER CHANGES
    result && React.createElement("div", { className: "p-8 bg-white rounded-2xl shadow-lg fade-in" },

      result.message &&
      React.createElement("div", {
        className: result.message.includes("Sorry") ? "text-red-500 mb-6 p-4 bg-red-50 rounded-lg" : "text-orange-600 mb-6 p-4 bg-orange-50 rounded-lg"
      }, result.message),

      React.createElement("div", { className: "grid grid-cols-1 md:grid-cols-2 gap-6 mb-6" },

        // MACHINE
        React.createElement("div", { className: "border border-gray-200 rounded-lg p-4" },
          React.createElement("p", { className: "text-sm text-gray-500 mb-2" }, "Coffee Machine"),
          result.machine ? React.createElement("div", null,
            result.machine.imageUrl && React.createElement("img", {
              src: result.machine.imageUrl,
              alt: result.machine.name,
              className: "w-full h-40 object-cover rounded mb-3",
              onError: (e) => e.target.style.display = "none"
            }),
            React.createElement("p", { className: "font-bold text-lg text-gray-900 mb-1" }, result.machine.name),
            React.createElement("p", { className: "text-gray-600 text-sm mb-2" }, result.machine.brand),
            React.createElement("p", { className: "text-xl font-bold text-green-600" },
              `Rp ${formatNumber(result.machine.price)}`
            ),
            React.createElement("p", { className: "text-sm text-gray-500 mt-2" },
              `Power: ${formatNumber(result.machine.power)} W`
            ),
            React.createElement("button", {
              onClick: () => {
                addFavorite({ ...result.machine, type: 'machine' });
                alert("Added to favorites! ❤️");
              },
              className: "mt-3 w-full bg-red-50 text-red-600 py-2 rounded hover:bg-red-100 transition text-sm font-semibold"
            }, "❤️ Add to Favorites")
          ) : React.createElement("p", { className: "text-gray-500" }, "Not required for your setup")
        ),

        // GRINDER
        React.createElement("div", { className: "border border-gray-200 rounded-lg p-4" },
          React.createElement("p", { className: "text-sm text-gray-500 mb-2" }, "Grinder"),
          result.grinder ? React.createElement("div", null,
            result.grinder.imageUrl && React.createElement("img", {
              src: result.grinder.imageUrl,
              alt: result.grinder.name,
              className: "w-full h-40 object-cover rounded mb-3",
              onError: (e) => e.target.style.display = "none"
            }),
            React.createElement("p", { className: "font-bold text-lg text-gray-900 mb-1" }, result.grinder.name),
            React.createElement("p", { className: "text-gray-600 text-sm mb-2" }, result.grinder.brand),
            React.createElement("p", { className: "text-xl font-bold text-green-600" },
              `Rp ${formatNumber(result.grinder.price)}`
            ),
            React.createElement("p", { className: "text-sm text-gray-500 mt-2" },
              `Power: ${formatNumber(result.grinder.power)} W`
            ),
            React.createElement("button", {
              onClick: () => {
                addFavorite({ ...result.grinder, type: 'grinder' });
                alert("Added to favorites! ❤️");
              },
              className: "mt-3 w-full bg-red-50 text-red-600 py-2 rounded hover:bg-red-100 transition text-sm font-semibold"
            }, "❤️ Add to Favorites")
          ) : React.createElement("p", { className: "text-gray-500" }, "Not required for your setup")
        )
      ),

      result.remaining > 0 &&

function BrowsePage({ machines, grinders }) {

  const [priceRange, setPriceRange] = useState([0, 50000000]);
  const [selectedBrands, setSelectedBrands] = useState([]);
  const [modalItem, setModalItem] = useState(null);

  const data = type === "machine" ? machines : grinders;
  const allBrands = [...new Set(data.map(i => i.brand))].sort();
  
  const maxPrice = Math.max(...data.map(i => i.price), 50000000);

  let filtered = data.filter(item =>
    (item.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
     item.brand.toLowerCase().includes(searchTerm.toLowerCase())) &&
    item.price >= priceRange[0] &&
    item.price <= priceRange[1] &&
    (selectedBrands.length === 0 || selectedBrands.includes(item.brand))
  );

  if (sortBy === "price-asc") filtered.sort((a, b) => a.price - b.price);
  if (sortBy === "price-desc") filtered.sort((a, b) => b.price - a.price);
  if (sortBy === "rating") filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  if (sortBy === "name") filtered.sort((a, b) => a.name.localeCompare(b.name));

  const handleBrandToggle = (brand) => {
    setSelectedBrands(prev =>
      prev.includes(brand) ? prev.filter(b => b !== brand) : [...prev, brand]
    );

    setPriceRange([priceRange[0], parseInt(value)]);

    setSearchTerm("");
    setSelectedBrands([]);
    setPriceRange([0, maxPrice]);

========================= */
function App() {

  const [page, setPage] = useState("home");
  const [machines, setMachines] = useState([]);
  const [grinders, setGrinders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    setLoading(true);
    fetch("https://script.google.com/macros/s/AKfycbwt1UcSPjISrDQnCuDXDzMKt_kplTr2RDf_PE3hkqufn2a266vgwMeIX4SdAr--Lk3vyw/exec")
      .then(res => {
        if (!res.ok) throw new Error("Failed to fetch data");
        return res.json();
      })
      .then(data => {
        if (!Array.isArray(data) || data.length === 0) {
          throw new Error("No data received from server");
        }
        setMachines(data.filter(i => i.type === "machine"));
        setGrinders(data.filter(i => i.type === "grinder"));
        setLoading(false);
      })
      .catch(err => {
        console.error("Error loading data:", err);
        setError(err.message);
        setLoading(false);
      });
  }, []);

  if (loading) {
    return React.createElement(LoadingSkeleton);
  }

  if (error) {
    return React.createElement(ErrorFallback, {
      message: error,
      onRetry: () => {
        setLoading(true);
        setError(null);
        window.location.reload();
      }
    });
  }

  if (page === "home") {
    return React.createElement(Home, {
      goToRecommend: () => setPage("recommend"),
      goToCompare: () => setPage("compare"),
      goToBrowse: () => setPage("browse"),
      goToFavorites: () => setPage("favorites")
    });
  }

  if (page === "favorites") {
    return React.createElement(FavoritesPage);
  }

  if (page === "recommend") {
    return React.createElement(RecommendationPage, { machines, grinders });
  }

  if (page === "compare") {
    return React.createElement(ComparePage, { machines, grinders });
  }

  if (page === "browse") {
    return React.createElement(BrowsePage, { machines, grinders });
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
