<!DOCTYPE html>
<html>
<head>
  <title>Coffee Setup</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>

<script>
const { useState } = React;

// DATA
const [machines, setMachines] = useState([]);
const [grinders, setGrinders] = useState([]);

React.useEffect(() => {
  fetch("https://script.google.com/macros/s/AKfycbwt1UcSPjISrDQnCuDXDzMKt_kplTr2RDf_PE3hkqufn2a266vgwMeIX4SdAr--Lk3vyw/exec")
    .then(res => res.json())
    .then(data => {
      const m = data.filter(i => i.type === "machine");
      const g = data.filter(i => i.type === "grinder");

      setMachines(m);
      setGrinders(g);
    });
}, []);

// PAGE 1
function RecommendationPage({ machines, grinders }) {
  const [budget, setBudget] = useState(20000000);
  const [result, setResult] = useState(null);

  const generate = () => {
  // sort ascending (cheapest first)
  const sortedMachines = [...machines].sort((a,b)=>a.price-b.price);
  const sortedGrinders = [...grinders].sort((a,b)=>a.price-b.price);

let machine = [...machines]
  .filter(m => m.price <= budget * 0.7)
  .sort((a,b)=>b.price-a.price)[0];

let grinder = [...grinders]
  .filter(g => g.price <= budget * 0.3)
  .sort((a,b)=>b.price-a.price)[0];

  let fallback = false;

  // if no machine found → take cheapest as fallback
  if (!machine) {
    machine = sortedMachines[0];
    fallback = true;
  }

  // if no grinder found → take cheapest as fallback
  if (!grinder) {
    grinder = sortedGrinders[0];
    fallback = true;
  }

  setResult({ machine, grinder, fallback });
};

  return (
  React.createElement("div", {className:"p-6"},

    React.createElement("h1", {className:"text-xl font-bold"}, "Insert Your Budget"),

    React.createElement("input", {
      type:"number",
      placeholder:"Budget",
      onChange:e=>setBudget(Number(e.target.value)),
      className:"border p-2 mr-2"
    }),

    React.createElement("button", {
      onClick:generate,
      className:"bg-black text-white px-4 py-2"
    }, "Generate"),

    // ✅ SHOW MESSAGE HERE
    result?.fallback && React.createElement("p", {
      className:"text-red-500 font-bold mt-4"
    }, "Maaf, tidak ada setup sesuai budget. Berikut opsi terdekat:"),

    result && React.createElement("div", {className:"mt-4 border p-4"},

      React.createElement("p", {className:"font-bold"}, "Recommended Setup"),

      React.createElement("p", null, "Machine: " + result.machine?.name),
      React.createElement("p", null, "Grinder: " + result.grinder?.name),

      React.createElement("div", {className:"mt-4 text-sm text-gray-600"},
        "✔ Sesuai budget",
        React.createElement("br"),
        "✔ Cocok untuk penggunaan umum",
        React.createElement("br"),
        "✔ Value terbaik di range ini"
      ),

      React.createElement("a", {
        href: `https://wa.me/6285282704370?text=Halo, saya dapat rekomendasi:%0AMachine: ${result.machine?.name}%0AGrinder: ${result.grinder?.name}%0ABudget: ${budget}`,
        target: "_blank",
        className:"block mt-4 bg-green-500 text-white text-center py-2"
      }, "Diskusi via WhatsApp")
    )
  )
);
}
  
// PAGE 2
function ComparePage({ machines, grinders }) {
  const [type, setType] = useState("machine");
  const [selected, setSelected] = useState([]);

  const data = type === "machine" ? machines : grinders;

  const toggle = (item) => {
    if (selected.includes(item)) {
      setSelected(selected.filter(i => i !== item));
    } else if (selected.length < 5) {
      setSelected([...selected, item]);
    }
  };

  return (
    React.createElement("div", {className:"p-6"},
      React.createElement("h1", {className:"text-xl font-bold"}, "Compare"),

      React.createElement("select", {
        onChange:e=>setType(e.target.value),
        className:"border p-2 mb-4"
      },
        React.createElement("option", {value:"machine"}, "Coffee Machine"),
        React.createElement("option", {value:"grinder"}, "Grinder")
      ),

      data.map(item =>
        React.createElement("div", {key:item.name, className:"border p-2 mb-2"},
          item.name,
          React.createElement("button", {
            onClick:()=>toggle(item),
            className:"ml-2 bg-gray-200 px-2"
          }, "Select")
        )
      ),

      selected.length > 0 &&
      React.createElement("table", {className:"mt-4 border"},
        React.createElement("tbody", null,
          ["brand","price","power","madeIn"].map(field =>
            React.createElement("tr", {key:field},
              React.createElement("td", {className:"border p-2"}, field),
              ...selected.map((i, idx) =>
                React.createElement("td", {key:idx, className:"border p-2"}, i[field])
              )
            )
          )
        )
      )
    )
  );
}
  
// MAIN APP
function App() {
  const [page, setPage] = useState("recommendation");

  const [machines, setMachines] = useState([]);
  const [grinders, setGrinders] = useState([]);

  // ✅ FETCH DATA HERE
  React.useEffect(() => {
    fetch("https://script.google.com/macros/s/AKfycbwt1UcSPjISrDQnCuDXDzMKt_kplTr2RDf_PE3hkqufn2a266vgwMeIX4SdAr--Lk3vyw/exec")
      .then(res => res.json())
      .then(data => {
        const m = data.filter(i => i.type === "machine");
        const g = data.filter(i => i.type === "grinder");

        setMachines(m);
        setGrinders(g);
      })
      .catch(err => console.error("Fetch error:", err));
  }, []);

  return (
    React.createElement("div", null,

      React.createElement("div", {className:"p-4 bg-gray-100"},
        React.createElement("button", {onClick:()=>setPage("recommendation")}, "Recommendation"),
        React.createElement("button", {onClick:()=>setPage("compare"), className:"ml-2"}, "Compare")
      ),

      page === "recommendation"
        ? React.createElement(RecommendationPage, { machines, grinders })
        : React.createElement(ComparePage, { machines, grinders })
    )
  );
}
  
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
