<!DOCTYPE html>
<html>
<head>
  <title>DoseClose</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="bg-[#eef1f3]">
<div id="root"></div>

<script src="data.js"></script>

<script>
const { useState, useEffect } = React;

/* =========================
   HELPERS
========================= */
const formatNumber = (num) => num ? num.toLocaleString("en-US") : "";
const parseNumber = (val) => Number(val.replace(/[^0-9]/g, "")) || 0;

/* =========================
   HOMEPAGE (FIXED UI)
========================= */
function Home({ goToRecommend, goToCompare }) {
  return React.createElement("div", { className: "text-center" },

    // LOGO
    React.createElement("div", { className: "py-10" },
      React.createElement("img", {
        src: "logo.png",
        className: "mx-auto w-[420px]"
      })
    ),

    // COPY BOX
    React.createElement("div", {
      className: "bg-[#b8a999] rounded-3xl py-20 px-10 max-w-4xl mx-auto mb-10"
    },
      React.createElement("p", { className:"text-lg" },
        "Find your perfect coffee setup without confusion. Just input your budget and let us guide you."
      )
    ),

    // BUTTONS
    React.createElement("div", { className: "flex justify-center gap-20 pb-20" },

      React.createElement("button", {
        onClick: goToRecommend,
        className: "bg-black text-white px-10 py-4 rounded-2xl text-lg font-semibold"
      }, "Recommend Me!"),

      React.createElement("button", {
        onClick: goToCompare,
        className: "bg-black text-white px-10 py-4 rounded-2xl text-lg font-semibold"
      }, "Let’s Compare!")
    )
  );
}

/* =========================
   RECOMMENDATION PAGE (FIXED LOGIC)
========================= */
function RecommendationPage({ machines, grinders }) {

  const [budgetInput, setBudgetInput] = useState("");
  const [budget, setBudget] = useState(0);
  const [machinePct, setMachinePct] = useState(70);
  const [grinderPct, setGrinderPct] = useState(30);
  const [result, setResult] = useState(null);

  const handleBudgetChange = (val) => {
    const num = parseNumber(val);
    setBudget(num);
    setBudgetInput(val === "" ? "" : formatNumber(num));
  };

  const getBestItem = (items, maxBudget) => {
    return items
      .filter(i => i.price <= maxBudget)
      .sort((a,b)=>b.price-a.price)[0] || null;
  };

  const getCheapest = (items) => {
    return [...items].sort((a,b)=>a.price-b.price)[0];
  };

  const generate = () => {

    if (!budget) {
      alert("Please insert your budget");
      return;
    }

    let machine = null;
    let grinder = null;

    // ======================
    // MACHINE
    // ======================
    if (machinePct > 0) {
      const machineBudget = budget * (machinePct/100);
      machine = getBestItem(machines, machineBudget);
    }

    // ======================
    // GRINDER
    // ======================
    if (grinderPct > 0) {
      const grinderBudget = budget * (grinderPct/100);
      grinder = getBestItem(grinders, grinderBudget);
    }

    // ======================
    // IF BOTH EXIST → CHECK TOTAL
    // ======================
    let message = "";
    let remaining = 0;

    let totalUsed =
      (machine?.price || 0) +
      (grinder?.price || 0);

    // ❌ CASE: NOTHING MATCHES IN SPLIT
    if ((machinePct > 0 && !machine) || (grinderPct > 0 && !grinder)) {

      // Try global best combination
      let bestMachine = getBestItem(machines, budget);
      let bestGrinder = getBestItem(grinders, budget);

      if (!bestMachine) bestMachine = getCheapest(machines);
      if (!bestGrinder) bestGrinder = getCheapest(grinders);

      const minSetup = getCheapest(machines).price + getCheapest(grinders).price;

      if (budget < minSetup) {
        const diff = minSetup - budget;
        message = `Sorry, there's no suitable setup within the budget. Add Rp ${formatNumber(diff)} more to get started.`;
      }

      machine = machinePct > 0 ? bestMachine : null;
      grinder = grinderPct > 0 ? bestGrinder : null;

      totalUsed =
        (machine?.price || 0) +
        (grinder?.price || 0);
    }

    // ✅ REMAINING
    if (totalUsed <= budget) {
      remaining = budget - totalUsed;
    } else {
      const diff = totalUsed - budget;
      message = `Add Rp ${formatNumber(diff)} more to get this setup`;
    }

    setResult({ machine, grinder, message, remaining });
  };

  return React.createElement("div", { className: "p-10 max-w-3xl mx-auto" },

    React.createElement("button", {
      onClick: ()=>location.reload(),
      className:"mb-6 underline"
    }, "← Back"),

    // BUDGET INPUT
    React.createElement("div", { className:"flex mb-6" },
      React.createElement("span", { className:"bg-[#b8a999] px-3 py-2" }, "Rp"),
      React.createElement("input", {
        type:"text",
        value: budgetInput,
        placeholder:"Insert your budget",
        onChange:e=>handleBudgetChange(e.target.value),
        className:"w-full p-2"
      })
    ),

    // SLIDER
    React.createElement("p", null, `Machine (${machinePct}%)`),
    React.createElement("input", {
      type:"range",
      min:0,
      max:100,
      value:machinePct,
      onChange:e=>{
        const val = Number(e.target.value);
        setMachinePct(val);
        setGrinderPct(100 - val);
      }
    }),

    React.createElement("p", null, `Grinder (${grinderPct}%)`),
    React.createElement("input", {
      type:"range",
      min:0,
      max:100,
      value:grinderPct,
      onChange:e=>{
        const val = Number(e.target.value);
        setGrinderPct(val);
        setMachinePct(100 - val);
      }
    }),

    React.createElement("button", {
      onClick:generate,
      className:"bg-black text-white w-full mt-4 py-3 rounded-xl"
    }, "Generate Recommendation"),

    // RESULT
    result && React.createElement("div", { className:"mt-6 p-6 bg-white rounded-2xl shadow" },

      result.message &&
      React.createElement("p", { className:"text-red-500 mb-3" }, result.message),

      React.createElement("p", null,
        "Machine: " + (result.machine ? result.machine.name : "Not required for your setup")
      ),

      React.createElement("p", null,
        "Grinder: " + (result.grinder ? result.grinder.name : "Not required for your setup")
      ),

      result.remaining > 0 &&
      React.createElement("p", { className:"text-green-600 mt-2" },
        `You still have Rp ${formatNumber(result.remaining)} remaining`
      ),

      React.createElement("a", {
        href:`https://wa.me/6285282704370?text=Hi!, can you give me more info about this setup?%0ACoffee Machine: ${result.machine?.name || "-"}%0AGrinder: ${result.grinder?.name || "-"}`,
        target:"_blank",
        className:"block mt-4 bg-green-500 text-white text-center py-2 rounded"
      }, "Discuss via WhatsApp")
    )
  );
}

function ComparePage({ machines, grinders, goBack }) {

  const [type, setType] = useState("machine");
  const [itemA, setItemA] = useState(null);
  const [itemB, setItemB] = useState(null);
  const [show, setShow] = useState(false);

  const data = type === "machine" ? machines : grinders;

  const handleCompare = () => {
    if (!itemA || !itemB) {
      alert("Please select both products");
      return;
    }
    setShow(true);
  };

  return React.createElement("div", { className:"p-10 max-w-5xl mx-auto" },

    React.createElement("button", {
      onClick: goBack,
      className:"mb-6 underline"
    }, "← Back"),

    React.createElement("h2", {
      className:"text-xl font-bold mb-6"
    }, "Compare Products"),

    // TYPE SELECT
    React.createElement("select", {
      value:type,
      onChange:e=>{
        setType(e.target.value);
        setItemA(null);
        setItemB(null);
        setShow(false);
      },
      className:"w-full p-2 border mb-6"
    },
      React.createElement("option",{value:"machine"},"Coffee Machine"),
      React.createElement("option",{value:"grinder"},"Grinder")
    ),

    // OPTION A
    React.createElement("div",{className:"mb-4"},
      React.createElement("p",null,"Select Option A"),
      React.createElement("select",{
        className:"w-full p-2 border",
        onChange:e=>{
          setItemA(data.find(d=>d.name===e.target.value));
        }
      },
        React.createElement("option",null,"-- Choose Product --"),
        data.map(item =>
          React.createElement("option",{key:item.name},item.name)
        )
      )
    ),

    // OPTION B
    React.createElement("div",{className:"mb-6"},
      React.createElement("p",null,"Select Option B"),
      React.createElement("select",{
        className:"w-full p-2 border",
        onChange:e=>{
          setItemB(data.find(d=>d.name===e.target.value));
        }
      },
        React.createElement("option",null,"-- Choose Product --"),
        data.map(item =>
          React.createElement("option",{key:item.name},item.name)
        )
      )
    ),

    // BUTTON
    React.createElement("button",{
      onClick:handleCompare,
      className:"bg-black text-white w-full py-3 rounded-xl"
    },"Compare"),

    // RESULT
    show &&
    React.createElement("div",{className:"grid grid-cols-2 gap-6 mt-10"},

      [itemA, itemB].map((item,idx)=>
        React.createElement("div",{
          key:idx,
          className:"bg-black text-white p-6 rounded-2xl"
        },

          React.createElement("h3",{className:"mb-4 font-bold"},
            idx===0 ? "Option A" : "Option B"
          ),

          React.createElement("p",null,"Brand: "+item.brand),
          React.createElement("p",null,"Name: "+item.name),
          React.createElement("p",null,"Price: Rp "+formatNumber(item.price)),
          React.createElement("p",null,"Power: "+formatNumber(item.power)+" W"),
          React.createElement("p",null,"Made In: "+item.madeIn)
        )
      )
    )
  );
}
  
/* =========================
   APP
========================= */
function App() {

  const [page, setPage] = useState("home");
  const [machines, setMachines] = useState([]);
  const [grinders, setGrinders] = useState([]);

  useEffect(() => {
    fetch("https://script.google.com/macros/s/AKfycbwt1UcSPjISrDQnCuDXDzMKt_kplTr2RDf_PE3hkqufn2a266vgwMeIX4SdAr--Lk3vyw/exec")
      .then(res => res.json())
      .then(data => {
        setMachines(data.filter(i=>i.type==="machine"));
        setGrinders(data.filter(i=>i.type==="grinder"));
      });
  }, []);

  if (page === "home") {
    return React.createElement(Home, {
      goToRecommend: ()=>setPage("recommend"),
      goToCompare: ()=>setPage("compare")
    });
  }

  if (page === "recommend") {
    return React.createElement(RecommendationPage, {
      machines,
      grinders
    });
  }

  if (page === "compare") {
    return React.createElement(ComparePage, {
      machines,
      grinders,
      goBack: ()=>setPage("home")
    });
  }
}
  
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
