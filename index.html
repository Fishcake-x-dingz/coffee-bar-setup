<!DOCTYPE html>
<html>
<head>
  <title>DoseClose</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="bg-[#f5f5f5]">
<div id="root"></div>

<script src="data.js"></script>

<script>
const { useState, useEffect } = React;

/* =========================
   HELPERS
========================= */
const formatNumber = (num) =>
  num ? num.toLocaleString("en-US") : "";

const parseNumber = (val) =>
  Number(val.replace(/[^0-9]/g, "")) || 0;

/* =========================
   HOME
========================= */
function Home({ goToRecommend, goToCompare }) {
  return React.createElement("div", { className: "text-center p-10" },

    React.createElement("img", {
      src: "logo.png",
      className: "mx-auto w-72 mb-6"
    }),

    React.createElement("div", { className: "flex justify-center gap-6 mb-10" },

      React.createElement("button", {
        onClick: goToRecommend,
        className: "bg-black text-white px-6 py-3 rounded-xl"
      }, "Recommend Me!"),

      React.createElement("button", {
        onClick: goToCompare,
        className: "bg-black text-white px-6 py-3 rounded-xl"
      }, "Let’s Compare!")
    )
  );
}

/* =========================
   RECOMMENDATION
========================= */
function RecommendationPage({ machines, grinders }) {

  const [budgetInput, setBudgetInput] = useState("");
  const [budget, setBudget] = useState(0);
  const [machinePct, setMachinePct] = useState(70);
  const [grinderPct, setGrinderPct] = useState(30);
  const [result, setResult] = useState(null);

  const handleBudgetChange = (val) => {
    const num = parseNumber(val);
    setBudget(num);
    setBudgetInput(val === "" ? "" : formatNumber(num));
  };

  const generate = () => {

    if (!budget) {
      alert("Insert your budget");
      return;
    }

    let machine = null;
    let grinder = null;

    if (machinePct > 0) {
      machine = machines
        .filter(m => m.price <= budget * (machinePct/100))
        .sort((a,b)=>b.price-a.price)[0];
    }

    if (grinderPct > 0) {
      grinder = grinders
        .filter(g => g.price <= budget * (grinderPct/100))
        .sort((a,b)=>b.price-a.price)[0];
    }

    // fallback to cheapest IF NOTHING FOUND
    if (!machine && machinePct > 0) {
      machine = [...machines].sort((a,b)=>a.price-b.price)[0];
    }

    if (!grinder && grinderPct > 0) {
      grinder = [...grinders].sort((a,b)=>a.price-b.price)[0];
    }

    const totalUsed =
      (machine?.price || 0) +
      (grinder?.price || 0);

    let message = "";
    let remaining = 0;

    if (totalUsed > budget) {
      const diff = totalUsed - budget;
      message = `Add Rp ${formatNumber(diff)} more to get this setup`;
    } else {
      remaining = budget - totalUsed;
    }

    setResult({ machine, grinder, message, remaining });
  };

  return React.createElement("div", { className: "p-10 max-w-3xl mx-auto" },

    React.createElement("button", {
      onClick: ()=>location.reload(),
      className:"mb-6 underline"
    }, "← Back"),

    React.createElement("div", { className:"flex mb-6" },
      React.createElement("span", { className:"bg-[#b8a999] px-3 py-2" }, "Rp"),
      React.createElement("input", {
        type:"text",
        value: budgetInput,
        placeholder:"Insert your budget",
        onChange:e=>handleBudgetChange(e.target.value),
        className:"w-full p-2"
      })
    ),

    React.createElement("p", null, `Machine (${machinePct}%)`),
    React.createElement("input", {
      type:"range",
      min:0,
      max:100,
      value:machinePct,
      onChange:e=>{
        setMachinePct(Number(e.target.value));
        setGrinderPct(100 - Number(e.target.value));
      }
    }),

    React.createElement("p", null, `Grinder (${grinderPct}%)`),
    React.createElement("input", {
      type:"range",
      min:0,
      max:100,
      value:grinderPct,
      onChange:e=>{
        setGrinderPct(Number(e.target.value));
        setMachinePct(100 - Number(e.target.value));
      }
    }),

    React.createElement("button", {
      onClick:generate,
      className:"bg-black text-white w-full mt-4 py-2"
    }, "Generate"),

    result && React.createElement("div", { className:"mt-6 p-4 bg-white rounded" },

      result.message &&
      React.createElement("p", { className:"text-red-500" }, result.message),

      React.createElement("p", null,
        "Machine: " + (result.machine?.name || "-")
      ),

      React.createElement("p", null,
        "Grinder: " + (result.grinder?.name || "-")
      ),

      result.remaining > 0 &&
      React.createElement("p", { className:"text-green-600" },
        `Remaining: Rp ${formatNumber(result.remaining)}`
      ),

      React.createElement("a", {
        href:`https://wa.me/6285282704370?text=Hi!, can you give me more info about this setup?%0ACoffee Machine: ${result.machine?.name || "-"}%0AGrinder: ${result.grinder?.name || "-"}`,
        target:"_blank",
        className:"block mt-4 bg-green-500 text-white text-center py-2"
      }, "WhatsApp")
    )
  );
}

/* =========================
   MAIN
========================= */
function App() {
  const [page, setPage] = useState("home");
  const [machines, setMachines] = useState([]);
  const [grinders, setGrinders] = useState([]);

  useEffect(() => {
    fetch("https://script.google.com/macros/s/AKfycbwt1UcSPjISrDQnCuDXDzMKt_kplTr2RDf_PE3hkqufn2a266vgwMeIX4SdAr--Lk3vyw/exec")
      .then(res => res.json())
      .then(data => {
        setMachines(data.filter(i=>i.type==="machine"));
        setGrinders(data.filter(i=>i.type==="grinder"));
      });
  }, []);

  if (page === "home") {
    return React.createElement(Home, {
      goToRecommend: ()=>setPage("recommend"),
      goToCompare: ()=>setPage("compare")
    });
  }

  return React.createElement(RecommendationPage, { machines, grinders });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
