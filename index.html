<!DOCTYPE html>
<html>
<head>
  <title>DoseClose</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="bg-[#f5f5f5]">
<div id="root"></div>

<script src="data.js"></script>

<script>
const { useState, useEffect } = React;

/* =========================
   HOMEPAGE HERO
========================= */
function Home({ goToRecommend, goToCompare }) {
  return (
    React.createElement("div", { className: "text-center p-10" },

      React.createElement("img", {
        src: "logo.png",
        className: "mx-auto w-72 mb-6"
      }),

      React.createElement("div", { className: "flex justify-center gap-6 mb-10" },

        React.createElement("button", {
          onClick: goToRecommend,
          className: "bg-black text-white px-6 py-3 rounded-xl text-lg font-semibold"
        }, "Recommend Me!"),

        React.createElement("button", {
          onClick: goToCompare,
          className: "bg-black text-white px-6 py-3 rounded-xl text-lg font-semibold"
        }, "Let’s Compare!")
      ),

      React.createElement("div", {
        className: "bg-[#b8a999] text-black rounded-2xl p-10 max-w-3xl mx-auto"
      },
        "Find your perfect coffee setup without confusion. Just input your budget and let us do the thinking."
      )
    )
  );
}

/* =========================
   RECOMMENDATION PAGE
========================= */
function RecommendationPage({ machines, grinders }) {

  const [budget, setBudget] = useState(20000000);
  const [machinePct, setMachinePct] = useState(70);
  const [grinderPct, setGrinderPct] = useState(30);
  const [result, setResult] = useState(null);

  // sync sliders
  const updateMachine = (val) => {
    setMachinePct(val);
    setGrinderPct(100 - val);
  };

  const updateGrinder = (val) => {
    setGrinderPct(val);
    setMachinePct(100 - val);
  };

  const generate = () => {

    let machine = machines
      .filter(m => m.price <= budget * (machinePct/100))
      .sort((a,b)=>b.price-a.price)[0];

    let grinder = grinders
      .filter(g => g.price <= budget * (grinderPct/100))
      .sort((a,b)=>b.price-a.price)[0];

    if (!machine) machine = machines.sort((a,b)=>a.price-b.price)[0];
    if (!grinder) grinder = grinders.sort((a,b)=>a.price-b.price)[0];

    setResult({ machine, grinder });
  };

  return (
    React.createElement("div", { className: "p-10 max-w-3xl mx-auto" },

      React.createElement("button", {
        onClick: ()=>location.reload(),
        className:"mb-6 text-sm underline"
      }, "← Back"),

      React.createElement("h2", { className:"text-xl font-semibold mb-4" }, "Insert your budget"),

      React.createElement("div", { className:"flex items-center mb-6" },
        React.createElement("span", { className:"bg-[#b8a999] px-3 py-2" }, "Rp"),
        React.createElement("input", {
          type:"number",
          value: budget,
          onChange:e=>setBudget(Number(e.target.value)),
          className:"w-full p-2"
        })
      ),

      React.createElement("div", { className:"mb-6" },
        React.createElement("p", {className:"mb-2 font-semibold"}, "Coffee Machine ({machinePct}%)"),
        React.createElement("input", {
          type:"range",
          min:0,
          max:100,
          value:machinePct,
          onChange:e=>updateMachine(Number(e.target.value)),
          className:"w-full"
        })
      ),

      React.createElement("div", { className:"mb-6" },
        React.createElement("p", {className:"mb-2 font-semibold"}, "Grinder ({grinderPct}%)"),
        React.createElement("input", {
          type:"range",
          min:0,
          max:100,
          value:grinderPct,
          onChange:e=>updateGrinder(Number(e.target.value)),
          className:"w-full"
        })
      ),

      React.createElement("button", {
        onClick:generate,
        className:"bg-black text-white px-6 py-3 rounded-xl w-full"
      }, "Generate Recommendation"),

      result && React.createElement("div", {
        className:"mt-8 bg-white p-6 rounded-2xl shadow"
      },

        React.createElement("h3", {className:"font-bold mb-4"}, "Your Setup"),

        React.createElement("p", null, "Machine: " + result.machine?.name),
        React.createElement("p", null, "Grinder: " + result.grinder?.name),

        React.createElement("a", {
          href:`https://wa.me/6285282704370?text=Machine:${result.machine?.name}%0AGrinder:${result.grinder?.name}`,
          target:"_blank",
          className:"block mt-4 bg-green-500 text-white text-center py-2 rounded"
        }, "Discuss via WhatsApp")
      )
    )
  );
}

/* =========================
   COMPARE PAGE
========================= */
function ComparePage({ machines, grinders }) {

  const [type, setType] = useState("machine");
  const [itemA, setItemA] = useState(null);
  const [itemB, setItemB] = useState(null);
  const [showResult, setShowResult] = useState(false);

  const data = type === "machine" ? machines : grinders;

  const handleCompare = () => {
    if (itemA && itemB) {
      setShowResult(true);
    }
  };

  return (
    React.createElement("div", { className:"p-10 max-w-5xl mx-auto" },

      // BACK
      React.createElement("button", {
        onClick: ()=>location.reload(),
        className:"mb-6 text-sm underline"
      }, "← Back"),

      React.createElement("h2", { className:"text-xl font-bold mb-6" }, "Let’s Compare"),

      // TYPE SELECT
      React.createElement("select", {
        onChange:e=>{
          setType(e.target.value);
          setItemA(null);
          setItemB(null);
          setShowResult(false);
        },
        className:"p-2 mb-6 border w-full"
      },
        React.createElement("option",{value:"machine"},"Coffee Machine"),
        React.createElement("option",{value:"grinder"},"Grinder")
      ),

      // DROPDOWN A
      React.createElement("div", { className:"mb-4" },
        React.createElement("p", {className:"mb-1"}, "Select Option A"),
        React.createElement("select", {
          onChange:e=>{
            const selectedItem = data.find(d => d.name === e.target.value);
            setItemA(selectedItem);
          },
          className:"p-2 border w-full"
        },
          React.createElement("option", null, "-- Choose Product --"),
          data.map(item =>
            React.createElement("option", { key:item.name }, item.name)
          )
        )
      ),

      // DROPDOWN B
      React.createElement("div", { className:"mb-6" },
        React.createElement("p", {className:"mb-1"}, "Select Option B"),
        React.createElement("select", {
          onChange:e=>{
            const selectedItem = data.find(d => d.name === e.target.value);
            setItemB(selectedItem);
          },
          className:"p-2 border w-full"
        },
          React.createElement("option", null, "-- Choose Product --"),
          data.map(item =>
            React.createElement("option", { key:item.name }, item.name)
          )
        )
      ),

      // BUTTON
      React.createElement("button", {
        onClick:handleCompare,
        className:"bg-black text-white px-6 py-3 rounded-xl w-full"
      }, "Compare"),

      // RESULT
      showResult && itemA && itemB &&
      React.createElement("div", { className:"grid grid-cols-2 gap-6 mt-10" },

        // OPTION A
        React.createElement("div", {
          className:"bg-black text-white p-6 rounded-2xl"
        },
          React.createElement("h3", {className:"font-bold mb-4"}, "Option A"),

          React.createElement("p", null, "Brand: " + itemA.brand),
          React.createElement("p", null, "Name: " + itemA.name),
          React.createElement("p", null, "Price: " + itemA.price),
          React.createElement("p", null, "Power: " + itemA.power),
          React.createElement("p", null, "Made In: " + itemA.madeIn)
        ),

        // OPTION B
        React.createElement("div", {
          className:"bg-black text-white p-6 rounded-2xl"
        },
          React.createElement("h3", {className:"font-bold mb-4"}, "Option B"),

          React.createElement("p", null, "Brand: " + itemB.brand),
          React.createElement("p", null, "Name: " + itemB.name),
          React.createElement("p", null, "Price: " + itemB.price),
          React.createElement("p", null, "Power: " + itemB.power),
          React.createElement("p", null, "Made In: " + itemB.madeIn)
        )
      )
    )
  );
}
/* =========================
   MAIN APP
========================= */
function App() {

  const [page, setPage] = useState("home");
  const [machines, setMachines] = useState([]);
  const [grinders, setGrinders] = useState([]);

  useEffect(() => {
    fetch("https://script.google.com/macros/s/AKfycbwt1UcSPjISrDQnCuDXDzMKt_kplTr2RDf_PE3hkqufn2a266vgwMeIX4SdAr--Lk3vyw/exec")
      .then(res => res.json())
      .then(data => {
        setMachines(data.filter(i=>i.type==="machine"));
        setGrinders(data.filter(i=>i.type==="grinder"));
      });
  }, []);

  if (page === "home") {
    return React.createElement(Home, {
      goToRecommend: ()=>setPage("recommend"),
      goToCompare: ()=>setPage("compare")
    });
  }

  if (page === "recommend") {
    return React.createElement(RecommendationPage, { machines, grinders });
  }

  return React.createElement(ComparePage, { machines, grinders });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
