<!DOCTYPE html>
<html>
<head>
  <title>Coffee Setup</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>

<script>
const { useState } = React;

// DATA
const machines = [
  { name: "Jura E6", brand:"Jura", price: 15000000, power:1450, madeIn:"Swiss" },
  { name: "Delonghi ECAM 350", brand:"Delonghi", price: 17000000, power:1350, madeIn:"Italy" },
  { name: "Kalerm X465", brand:"Kalerm", price: 12000000, power:1500, madeIn:"China" }
];

const grinders = [
  { name: "Mazzer Mini", brand:"Mazzer", price: 8000000, power:350, madeIn:"Italy" },
  { name: "Eureka Mignon", brand:"Eureka", price: 7000000, power:310, madeIn:"Italy" },
  { name: "Baratza Sette", brand:"Baratza", price: 6000000, power:290, madeIn:"USA" }
];

// PAGE 1
function RecommendationPage() {
  const [budget, setBudget] = useState(20000000);
  const [result, setResult] = useState(null);

  const generate = () => {
    const machine = machines.find(m => m.price <= budget * 0.7);
    const grinder = grinders.find(g => g.price <= budget * 0.3);
    setResult({ machine, grinder });
  };

  return (
    React.createElement("div", {className:"p-6"},
      React.createElement("h1", {className:"text-xl font-bold"}, "Bar Setup Recommendation"),

      React.createElement("input", {
        type:"number",
        placeholder:"Budget",
        onChange:e=>setBudget(Number(e.target.value)),
        className:"border p-2 mr-2"
      }),

      React.createElement("button", {
        onClick:generate,
        className:"bg-black text-white px-4 py-2"
      }, "Generate"),

      result && React.createElement("div", {className:"mt-4 border p-4"},

  React.createElement("p", {className:"font-bold"}, "Recommended Setup"),

  React.createElement("p", null, "Machine: " + result.machine?.name),
  React.createElement("p", null, "Grinder: " + result.grinder?.name),

  React.createElement("div", {className:"mt-4 text-sm text-gray-600"},
    "✔ Sesuai budget\n",
    "✔ Cocok untuk penggunaan umum\n",
    "✔ Value terbaik di range ini"
  ),

  React.createElement("a", {
    href: `https://wa.me/6285282704370?text=Halo, saya dapat rekomendasi:%0AMachine: ${result.machine?.name}%0AGrinder: ${result.grinder?.name}%0ABudget: ${budget}`,
    target: "_blank",
    className:"block mt-4 bg-green-500 text-white text-center py-2"
  }, "Diskusi via WhatsApp")
),
  React.createElement("div", {className:"mt-4"},
  React.createElement("input", {
    placeholder:"Nama",
    className:"border p-2 w-full mb-2"
  }),
  React.createElement("input", {
    placeholder:"No HP",
    className:"border p-2 w-full mb-2"
  }),
  React.createElement("button", {
    className:"bg-black text-white w-full py-2"
  }, "Minta Penawaran")
)
        React.createElement("p", null, "Machine: " + result.machine?.name),
        React.createElement("p", null, "Grinder: " + result.grinder?.name)
      )
    )
  );
}

// PAGE 2
function ComparePage() {
  const [type, setType] = useState("machine");
  const [selected, setSelected] = useState([]);

  const tta= type === "machine" ? machines : grinders;

  const toggle = (item) => {
    if (selected.includes(item)) {
      setSelected(selected.filter(i => i !== item));
    } else if (selected.length < 5) {
      setSelected([...selected, item]);
    }
  };

  return (
    React.createElement("div", {className:"p-6"},
      React.createElement("h1", {className:"text-xl font-bold"}, "Compare"),

      React.createElement("select", {
        onChange:e=>setType(e.target.value),
        className:"border p-2 mb-4"
      },
        React.createElement("option", {value:"machine"}, "Coffee Machine"),
        React.createElement("option", {value:"grinder"}, "Grinder")
      ),

      data.map(item =>
        React.createElement("div", {key:item.name, className:"border p-2 mb-2"},
          item.name,
          React.createElement("button", {
            onClick:()=>toggle(item),
            className:"ml-2 bg-gray-200 px-2"
          }, "Select")
        )
      ),

      selected.length > 0 &&
      React.createElement("table", {className:"mt-4 border"},
        React.createElement("tbody", null,
          ["brand","price","power","madeIn"].map(field =>
            React.createElement("tr", {key:field},
              React.createElement("td", {className:"border p-2"}, field),
              ...selected.map(i =>
                React.createElement("td", {className:"border p-2"}, i[field])
              )
            )
          )
        )
      )
    )
  );
}

// MAIN APP
function App() {
  const [page, setPage] = useState("recommendation");

  return (
    React.createElement("div", null,
      React.createElement("div", {className:"p-4 bg-gray-100"},
        React.createElement("button", {onClick:()=>setPage("recommendation")}, "Recommendation"),
        React.createElement("button", {onClick:()=>setPage("compare"), className:"ml-2"}, "Compare")
      ),

      page === "recommendation"
        ? React.createElement(RecommendationPage)
        : React.createElement(ComparePage)
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
